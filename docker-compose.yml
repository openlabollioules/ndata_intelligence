services:
  qdrant:
    image: harbor.iss.naval-group.dev/docker.io/qdrant/qdrant
    pull_policy: never
    container_name: ndi-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - ./apps/api/data/qdrant:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
